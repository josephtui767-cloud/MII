<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="580" viewBox="0 0 1100 580">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#F1F5F9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLight">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="580" rx="12" fill="url(#bgGrad)" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Title -->
  <text x="550" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#334155" text-anchor="middle" letter-spacing="0.5">SYSTEM ARCHITECTURE</text>

  <!-- === DATA SOURCES (Left) === -->
  <g filter="url(#shadow)">
    <rect x="30" y="140" width="180" height="70" rx="10" fill="white" stroke="#F59E0B" stroke-width="2"/>
    <text x="120" y="170" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400E" text-anchor="middle">AWS</text>
    <text x="120" y="192" font-family="system-ui, sans-serif" font-size="11" fill="#78716C" text-anchor="middle">IAM · STS · Organizations</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="30" y="240" width="180" height="70" rx="10" fill="white" stroke="#F97316" stroke-width="2"/>
    <text x="120" y="270" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#9A3412" text-anchor="middle">GitLab / GitHub</text>
    <text x="120" y="292" font-family="system-ui, sans-serif" font-size="11" fill="#78716C" text-anchor="middle">CI/CD · OIDC · Tokens</text>
  </g>

  <text x="120" y="110" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748B" text-anchor="middle" letter-spacing="1">DATA SOURCES</text>
  <line x1="60" y1="120" x2="180" y2="120" stroke="#CBD5E1" stroke-width="0.5"/>

  <!-- === BACKEND (Center) === -->
  <g filter="url(#shadow)">
    <rect x="300" y="80" width="280" height="430" rx="12" fill="white" stroke="#3B82F6" stroke-width="2"/>
  </g>
  <text x="440" y="110" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1E40AF" text-anchor="middle" letter-spacing="1">BACKEND ENGINE</text>
  <line x1="320" y1="122" x2="560" y2="122" stroke="#DBEAFE" stroke-width="1"/>

  <!-- Backend sub-components -->
  <g filter="url(#shadowLight)">
    <rect x="320" y="138" width="240" height="52" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="440" y="160" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1D4ED8" text-anchor="middle">Collectors</text>
    <text x="440" y="178" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">AWS Collector · GitLab Collector</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="320" y="204" width="240" height="52" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="440" y="226" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1D4ED8" text-anchor="middle">Risk Engine</text>
    <text x="440" y="244" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">6-factor scoring (0–100)</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="320" y="270" width="240" height="52" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="440" y="292" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1D4ED8" text-anchor="middle">Graph Engine</text>
    <text x="440" y="310" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">NetworkX · Trust relationships</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="320" y="336" width="240" height="52" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="440" y="358" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1D4ED8" text-anchor="middle">Security Engines</text>
    <text x="440" y="376" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Findings · Compliance · Trust Debt · Blast Path</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="320" y="402" width="240" height="52" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
    <text x="440" y="424" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#6D28D9" text-anchor="middle">AI Advisor</text>
    <text x="440" y="442" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">OpenAI / Azure / Ollama · Remediation Plans</text>
  </g>

  <text x="440" y="486" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">FastAPI · Python 3.11 · SQLAlchemy</text>

  <!-- === DATABASE (Bottom Center) === -->
  <g filter="url(#shadow)">
    <rect x="360" y="510" width="160" height="52" rx="10" fill="white" stroke="#0EA5E9" stroke-width="2"/>
    <text x="440" y="534" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0369A1" text-anchor="middle">PostgreSQL 15</text>
    <text x="440" y="552" font-family="system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Identity metadata · Scan results</text>
  </g>

  <!-- === FRONTEND (Right) === -->
  <g filter="url(#shadow)">
    <rect x="670" y="110" width="250" height="360" rx="12" fill="white" stroke="#10B981" stroke-width="2"/>
  </g>
  <text x="795" y="140" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#065F46" text-anchor="middle" letter-spacing="1">FRONTEND</text>
  <line x1="690" y1="152" x2="900" y2="152" stroke="#D1FAE5" stroke-width="1"/>

  <!-- Frontend sub-components -->
  <g filter="url(#shadowLight)">
    <rect x="690" y="168" width="210" height="42" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="795" y="194" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#047857" text-anchor="middle">Executive Dashboard</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="690" y="222" width="210" height="42" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="795" y="248" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#047857" text-anchor="middle">Identity Explorer</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="690" y="276" width="210" height="42" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="795" y="302" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#047857" text-anchor="middle">Trust Graph (React Flow)</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="690" y="330" width="210" height="42" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="795" y="356" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#047857" text-anchor="middle">Security Views</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="690" y="384" width="210" height="42" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="795" y="410" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#047857" text-anchor="middle">AI Remediation UI</text>
  </g>

  <text x="795" y="452" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">React 18 · TypeScript · Tailwind CSS</text>

  <!-- === INFRASTRUCTURE (Far Right) === -->
  <g filter="url(#shadow)">
    <rect x="960" y="200" width="120" height="140" rx="10" fill="white" stroke="#6366F1" stroke-width="2"/>
    <text x="1020" y="228" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#4338CA" text-anchor="middle">Infrastructure</text>
    <line x1="975" y1="238" x2="1065" y2="238" stroke="#E0E7FF" stroke-width="0.5"/>
    <text x="1020" y="262" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">AWS EC2</text>
    <text x="1020" y="282" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">S3 + CloudFront</text>
    <text x="1020" y="302" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Terraform</text>
    <text x="1020" y="322" font-family="system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Docker</text>
  </g>

  <!-- === ARROWS === -->
  <!-- Data sources → Backend -->
  <path d="M210 175 L295 175" fill="none" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <path d="M210 275 L295 275" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Backend → Frontend -->
  <path d="M580 290 L665 290" fill="none" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="622" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">REST API</text>

  <!-- Backend → Database -->
  <path d="M440 510 L440 507" fill="none" stroke="#0EA5E9" stroke-width="2"/>

  <!-- Frontend → Infrastructure -->
  <path d="M920 290 L955 290" fill="none" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="none" stroke="#64748B" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Flow labels -->
  <text x="250" y="163" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Read-only</text>
  <text x="250" y="263" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Read-only</text>
</svg>
