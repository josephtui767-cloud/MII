<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#F1F5F9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowLight">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" rx="12" fill="url(#bgGrad)" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Title -->
  <text x="500" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#334155" text-anchor="middle" letter-spacing="0.5">SYSTEM ARCHITECTURE</text>

  <!-- === DATA SOURCES (Left) === -->
  <g filter="url(#shadow)">
    <rect x="30" y="120" width="160" height="60" rx="8" fill="white" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="110" y="147" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400E" text-anchor="middle">AWS</text>
    <text x="110" y="165" font-family="system-ui, sans-serif" font-size="9" fill="#78716C" text-anchor="middle">IAM · STS · Organizations</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="30" y="210" width="160" height="60" rx="8" fill="white" stroke="#F97316" stroke-width="1.5"/>
    <text x="110" y="237" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9A3412" text-anchor="middle">GitLab / GitHub</text>
    <text x="110" y="255" font-family="system-ui, sans-serif" font-size="9" fill="#78716C" text-anchor="middle">CI/CD · OIDC · Tokens</text>
  </g>

  <text x="110" y="90" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748B" text-anchor="middle" letter-spacing="1">DATA SOURCES</text>
  <line x1="60" y1="97" x2="160" y2="97" stroke="#CBD5E1" stroke-width="0.5"/>

  <!-- === BACKEND (Center) === -->
  <g filter="url(#shadow)">
    <rect x="280" y="70" width="240" height="380" rx="10" fill="white" stroke="#3B82F6" stroke-width="1.5"/>
  </g>
  <text x="400" y="96" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1E40AF" text-anchor="middle" letter-spacing="1">BACKEND ENGINE</text>
  <line x1="300" y1="106" x2="500" y2="106" stroke="#DBEAFE" stroke-width="1"/>

  <!-- Backend sub-components -->
  <g filter="url(#shadowLight)">
    <rect x="300" y="120" width="200" height="44" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="400" y="139" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1D4ED8" text-anchor="middle">Collectors</text>
    <text x="400" y="155" font-family="system-ui, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">AWS Collector · GitLab Collector</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="300" y="178" width="200" height="44" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="400" y="197" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1D4ED8" text-anchor="middle">Risk Engine</text>
    <text x="400" y="213" font-family="system-ui, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">6-factor scoring (0–100)</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="300" y="236" width="200" height="44" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="400" y="255" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1D4ED8" text-anchor="middle">Graph Engine</text>
    <text x="400" y="271" font-family="system-ui, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">NetworkX · Trust relationships</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="300" y="294" width="200" height="44" rx="6" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="400" y="313" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1D4ED8" text-anchor="middle">Security Engines</text>
    <text x="400" y="329" font-family="system-ui, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Findings · Compliance · Trust Debt · Blast Path</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="300" y="352" width="200" height="44" rx="6" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
    <text x="400" y="371" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6D28D9" text-anchor="middle">AI Advisor</text>
    <text x="400" y="387" font-family="system-ui, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">OpenAI GPT-4o · Remediation Plans</text>
  </g>

  <text x="400" y="430" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">FastAPI · Python 3.11 · SQLAlchemy</text>

  <!-- === DATABASE (Bottom Center) === -->
  <g filter="url(#shadow)">
    <rect x="330" y="455" width="140" height="46" rx="8" fill="white" stroke="#0EA5E9" stroke-width="1.5"/>
    <text x="400" y="477" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#0369A1" text-anchor="middle">PostgreSQL 15</text>
    <text x="400" y="493" font-family="system-ui, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Identity metadata · Scan results</text>
  </g>

  <!-- === FRONTEND (Right) === -->
  <g filter="url(#shadow)">
    <rect x="610" y="100" width="220" height="320" rx="10" fill="white" stroke="#10B981" stroke-width="1.5"/>
  </g>
  <text x="720" y="126" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065F46" text-anchor="middle" letter-spacing="1">FRONTEND</text>
  <line x1="630" y1="136" x2="810" y2="136" stroke="#D1FAE5" stroke-width="1"/>

  <!-- Frontend sub-components -->
  <g filter="url(#shadowLight)">
    <rect x="630" y="150" width="180" height="36" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="720" y="172" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#047857" text-anchor="middle">Executive Dashboard</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="630" y="198" width="180" height="36" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="720" y="220" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#047857" text-anchor="middle">Identity Explorer</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="630" y="246" width="180" height="36" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="720" y="268" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#047857" text-anchor="middle">Trust Graph (React Flow)</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="630" y="294" width="180" height="36" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="720" y="316" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#047857" text-anchor="middle">Security Views</text>
  </g>

  <g filter="url(#shadowLight)">
    <rect x="630" y="342" width="180" height="36" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="720" y="364" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#047857" text-anchor="middle">AI Remediation UI</text>
  </g>

  <text x="720" y="403" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">React 18 · TypeScript · Tailwind CSS</text>

  <!-- === INFRASTRUCTURE (Right Bottom) === -->
  <g filter="url(#shadow)">
    <rect x="860" y="200" width="120" height="120" rx="8" fill="white" stroke="#6366F1" stroke-width="1.5"/>
    <text x="920" y="226" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#4338CA" text-anchor="middle">Infrastructure</text>
    <line x1="875" y1="234" x2="965" y2="234" stroke="#E0E7FF" stroke-width="0.5"/>
    <text x="920" y="254" font-family="system-ui, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">AWS EC2</text>
    <text x="920" y="272" font-family="system-ui, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">S3 + CloudFront</text>
    <text x="920" y="290" font-family="system-ui, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Terraform</text>
    <text x="920" y="308" font-family="system-ui, sans-serif" font-size="8" fill="#64748B" text-anchor="middle">Docker</text>
  </g>

  <!-- === ARROWS === -->
  <!-- Data sources → Backend -->
  <path d="M190 150 L275 150" fill="none" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <path d="M190 240 L275 240" fill="none" stroke="#F97316" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Backend → Frontend -->
  <path d="M520 260 L605 260" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="563" y="252" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">REST API</text>

  <!-- Backend → Database -->
  <path d="M400 450 L400 452" fill="none" stroke="#0EA5E9" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Frontend → Infrastructure -->
  <path d="M830 260 L855 260" fill="none" stroke="#6366F1" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#F59E0B" stroke-width="1"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#64748B" stroke-width="1"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0EA5E9" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Flow labels -->
  <text x="232" y="140" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">Read-only</text>
  <text x="232" y="230" font-family="system-ui, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">Read-only</text>
</svg>
