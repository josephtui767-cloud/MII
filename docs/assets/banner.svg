<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="50%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="70" x2="1200" y2="70" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="140" x2="1200" y2="140" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="280" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="280" stroke="white" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="280" stroke="white" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="280" stroke="white" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="280" stroke="white" stroke-width="0.5"/>
  </g>
  
  <!-- Decorative nodes (trust graph aesthetic) -->
  <g opacity="0.12">
    <circle cx="100" cy="80" r="5" fill="#3B82F6"/>
    <circle cx="145" cy="55" r="4" fill="#8B5CF6"/>
    <circle cx="160" cy="100" r="6" fill="#3B82F6"/>
    <line x1="100" y1="80" x2="145" y2="55" stroke="#3B82F6" stroke-width="0.8"/>
    <line x1="145" y1="55" x2="160" y2="100" stroke="#8B5CF6" stroke-width="0.8"/>
    <line x1="100" y1="80" x2="160" y2="100" stroke="#3B82F6" stroke-width="0.8"/>
    
    <circle cx="1050" cy="180" r="5" fill="#8B5CF6"/>
    <circle cx="1100" cy="155" r="4" fill="#3B82F6"/>
    <circle cx="1120" cy="200" r="6" fill="#8B5CF6"/>
    <circle cx="1080" cy="220" r="4" fill="#3B82F6"/>
    <line x1="1050" y1="180" x2="1100" y2="155" stroke="#8B5CF6" stroke-width="0.8"/>
    <line x1="1100" y1="155" x2="1120" y2="200" stroke="#3B82F6" stroke-width="0.8"/>
    <line x1="1050" y1="180" x2="1080" y2="220" stroke="#8B5CF6" stroke-width="0.8"/>
    <line x1="1120" y1="200" x2="1080" y2="220" stroke="#3B82F6" stroke-width="0.8"/>
  </g>
  
  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>
  
  <!-- Shield icon -->
  <g transform="translate(430, 65)">
    <path d="M26 5 L5 13 L5 26 C5 40 15 52 26 57 C37 52 47 40 47 26 L47 13 Z" 
          fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.9"/>
    <path d="M19 29 L24 34 L35 21" 
          fill="none" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Main title -->
  <text x="490" y="105" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="white" letter-spacing="-1">
    MII
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="150" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#CBD5E1" text-anchor="middle">
    Machine Identity Intelligence
  </text>
  
  <!-- Tagline -->
  <text x="600" y="190" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#94A3B8" text-anchor="middle">
    Discover · Map · Score · Remediate
  </text>
  
  <!-- Bottom description -->
  <text x="600" y="235" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#64748B" text-anchor="middle">
    Open-source security platform for machine identities across AWS and CI/CD pipelines
  </text>
  
  <!-- Accent line bottom -->
  <rect x="0" y="277" width="1200" height="3" fill="url(#accent)"/>
</svg>
